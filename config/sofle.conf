# Uncomment the following line to enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Uncomment this line below to add rgb underglow / backlight support
CONFIG_ZMK_RGB_UNDERGLOW=y
# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n        # Underglow toggling also controls external power (default: y)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y    # Turn off RGB underglow when keyboard goes into idle state (default: n)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y     # Turn off RGB underglow when USB is disconnected (default: n)
CONFIG_WS2812_STRIP=y

# Backlight
# CONFIG_ZMK_BACKLIGHT=y
# CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y    # Turn off backlight when keyboard goes into idle state
# CONFIG_ZMK_BACKLIGHT_AUTO_OFF_USB=y     # Turn off backlight when USB is disconnected


# ZMK_BATTERY_REPORTING=y
# CONFIG_ZMK_WPM=y        # Enable calculating words per minute
CONFIG_BT_BAS=y         # Enable the Bluetooth BAS (battery reporting service)
# CONFIG_BT_MAX_CONN=5    # Maximum number of simultaneous Bluetooth connections (default: 5)
# CONFIG_BT_MAX_PAIRED=5  # Maximum number of paired Bluetooth devices (default: 5)
CONFIG_ZMK_BLE=y        # Enable ZMK as a Bluetooth keyboard
CONFIG_ZMK_SPLIT_BLE=y  # Use BLE to communicate between split keyboard halves
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1              # Number of peripherals that will connect to the central
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y   # Enable fetching split peripheral battery levels to the central side (default: n)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y      # Enable central reporting of split battery levels to hosts (default: n)